services:
  - type: web
    name: ai-restaurant-backend
    repo: https://github.com/SagarMedtiya/Ai-Powered-Restaurant
    branch: master
    buildCommand: ./mvnw clean package -DskipTests -Pprod
    startCommand: java -Xmx512m -Xms256m -jar target/recommender-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        value: https://ai-restaurant-recommender.streamlit.app,http://localhost:8501
    healthCheckPath: /actuator/health
    autoDeploy: true
