services:
  - type: web
    name: ai-restaurant-backend
    runtime: docker
    repo: https://github.com/SagarMedtiya/Ai-Powered-Restaurant
    branch: master
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        value: https://ai-powered-restaurant.vercel.app,https://ai-powered-restaurant-1.streamlit.app
      - key: DATASET_URL
        value: ""
    healthCheckPath: /actuator/health
    autoDeploy: true
