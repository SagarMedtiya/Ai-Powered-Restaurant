logging:
  level:
    root: WARN
    com.restaurant.recommender: INFO

app:
  dataset:
    force-download: false
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

spring:
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.groq.com/openai}
      chat:
        options:
          model: ${LLM_MODEL:llama-3.3-70b-versatile}
          temperature: 0.4
          max-tokens: 2000
